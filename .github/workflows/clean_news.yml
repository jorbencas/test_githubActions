name: 🧹 Mantenimiento Trimestral (Cleanup)
on:
  schedule:
    # Día 1 de Enero, Abril, Julio y Octubre a las 00:00 UTC
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  cleanup_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- CONFIGURACIÓN DE CACHÉ ---
      - name: Cache de dependencias de Python
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          # La clave de la caché depende del contenido de requirements.txt
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Sincronizar con el servidor
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git pull origin master --rebase

      - name: Ejecutar Script de Limpieza
        run: python clean_news.py

      - name: Guardar cambios en el JSON
        run: |
          git add files/all_news.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🧹 Mantenimiento trimestral: limpieza de enlaces"
          git push origin master