name: ⏰ Scraping Horario (tier light)
on:
  schedule:
    - cron: "0 * * * *" # Cada hora
  workflow_dispatch:

jobs:
  scrape_hourly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 💻 Scrape news (tier light — RSS + fuentes rápidas)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m scripts.scrapers.scrape_news --tier light
      - name: 📝 Push cambios
        if: always()
        run: |
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git add files/noticias_historico.json files/avatars_cache.json
          git diff --quiet --cached || git commit -m "[bot] hourly scrape (tier light)"
          git push origin master
