name: 🖼️ Optimizar imágenes del blog
on:
  repository_dispatch:
    types: [optimize-images]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📂 Checkout blog repo
        uses: actions/checkout@v4
        with:
          repository: jorbencas/blog
          path: blog
          token: ${{ secrets.BLOG_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          cd blog && python -m pip install -r requirements.txt

      - name: 🖼️ Optimizar imágenes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python blog/scripts/fix_images.py

      - name: 🚀 Push cambios al blog
        run: |
          cd blog
          git config user.name "jorbencas-bot"
          git config user.email "bot@jorbencas.dev"
          git add -A
          git diff --staged --quiet || (git commit -m "🖼️ optimize: imágenes optimizadas [skip ci]" && git push)
