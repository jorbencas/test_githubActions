name: 📊 Trends Scraper (Google Trends + TikTok)
on:
  schedule:
    - cron: "0 8 * * 2,5" # Martes y viernes 08:00 UTC
  workflow_dispatch:

jobs:
  scrape_trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🎭 Install Playwright browsers
        run: |
          python -m playwright install chromium
      - name: 📊 Scrape trends (Google Trends + TikTok)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m scripts.scrapers.scrape_trends
      - name: 📝 Push changes
        if: always()
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] update trends data"
          git push origin master
