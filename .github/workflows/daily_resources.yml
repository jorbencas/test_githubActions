name: 📦 Daily Resources Management
on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  resources_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Scrape tools (GitHub Trending + Product Hunt)
        run: python -m scripts.scrapers.scrape_tools

      - name: 📂 Checkout blog repo
        uses: actions/checkout@v3
        with:
          repository: jorbencas/blog
          path: blog
          token: ${{ secrets.BLOG_TOKEN }}
          fetch-depth: 1

      - name: 📊 Gestionar recursos (paginación + nuevas herramientas)
        id: resources_updated
        run: |
          python -m scripts.publishers.manage_resources --blog-path blog --tools-file files/herramientas.json --max-cards 500 --fix-spacing \
            && echo "updated=yes" >> $GITHUB_OUTPUT \
            || echo "updated=no" >> $GITHUB_OUTPUT

      - name: 🚀 Push directo al blog
        if: steps.resources_updated.outputs.updated == 'yes'
        run: |
          cd blog
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git add src/content/posts/resources*.mdx
          git diff --quiet && git diff --staged --quiet && echo "No hay cambios" && exit 0
          git commit -m "[recursos] actualización automática de recursos"
          git push origin main
          echo "✅ Push realizado a jorbencas/blog"

      - name: 📝 Push cambios a test_githubActions
        if: always()
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add files/herramientas.json
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] update tools data"
          git push origin master
