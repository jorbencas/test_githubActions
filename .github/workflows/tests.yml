name: 🧪 tests
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "📰 scraper_workflow"
      - "🎯 hunt_challenges"
    types:
      - completed

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🧪 Run tests
        run: |
          python -m unittest discover tests/ -v
