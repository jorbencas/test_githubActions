name: 📰 scraper_workflow
on:
  push:
    branches:
      - "master"
  schedule:
    - cron: "0 7 * * 6" # Ejecutar los sábados a las 9:00 UTC
  workflow_dispatch:

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
      - name: 🕑 Ajuste de Horario (Verano vs Invierno)
        if: github.event_name == 'schedule'
        run: |
          # Obtenemos el desfase horario actual de Madrid
          OFFSET=$(TZ="Europe/Madrid" date +%z)
          echo "Desfase actual con UTC: $OFFSET"
          
          if [ "$OFFSET" == "+0100" ]; then
            echo "Estamos en horario de VERANO. Esperando 1 hora para ser las 9:00 AM..."
            sleep 3600
          else
            echo "Estamos en horario de INVIERNO. Procediendo de inmediato (son las 9:00 AM)."
          fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Cache de dependencias de Python
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 telethon google-genai mtranslate edge-tts slugify python-slugify
      - name: Update Github repo
        if: github.event_name == 'schedule'
        run: |
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git pull origin master --rebase
      - name: 🖼️ Optimize Images
        run: |
          pip install Pillow
          python optimize.py
      - name: 💻 Run scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TOKEN_API_ID: ${{ secrets.TOKEN_API_ID }}
          DOWNLOADER_API_TOKEN: ${{ secrets.DOWNLOADER_API_TOKEN }}
        run: python downloadFile.py
        shell: bash
      - name: 📂 Checkout blog repo
        uses: actions/checkout@v3
        with:
          repository: jorbencas/blog
          path: blog
          token: ${{ secrets.BLOG_TOKEN }}
          fetch-depth: 0
      - name: 🔄 Copy auto-news to blog
        id: news_copied_to_blog_folder # You need an ID to reference it later
        run: |
          mkdir -p blog/src/content/auto-news
          # Seleccionar solo 1 archivo nuevo: priorizar IA, sino el primero, y checkear si no existe en blog
          selected_file=$(ls -t auto-news/*.md 2>/dev/null | grep -i ia | head -1)
          if [ -z "$selected_file" ]; then
              selected_file=$(ls -t auto-news/*.md 2>/dev/null | head -1)
          fi
          copied=""
          if [ -n "$selected_file" ] && [ ! -f "blog/src/content/auto-news/$(basename "$selected_file")" ]; then
              cp "$selected_file" blog/src/content/auto-news/
              copied="yes"
          fi
          echo "copied=$copied" >> $GITHUB_OUTPUT
      - name: 🚀 Commit and push to blog
        if: steps.news_copied_to_blog_folder.outputs.copied == 'yes'
        run: |
          cd blog
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git pull origin main --rebase
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Add auto-generated news posts"
          git push origin main
      - name: 📝 Update Github repo
        if: always()
        run: |
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] update tech news scraping"
          git push origin master
      - name: ✨ Deploy to jorbencasdownloaderdocument.surge.sh
        run : |
          npx surge public jorbencasdownloaderdocument.surge.sh --token ${{ secrets.SURGE_TOKEN }}
