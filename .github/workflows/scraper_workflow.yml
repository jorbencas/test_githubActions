name: 📰 Weekly Scraper (Noticias + Herramientas + Recap)
on:
  schedule:
    - cron: "0 7 * * 6" # Sábados 07:00 UTC
  workflow_dispatch:

jobs:
  weekly_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
      - name: 🕑 Ajuste de Horario (Verano vs Invierno)
        if: github.event_name == 'schedule'
        run: |
          OFFSET=$(TZ="Europe/Madrid" date +%z)
          echo "Desfase actual con UTC: $OFFSET"
          if [ "$OFFSET" == "+0100" ]; then
            echo "Estamos en horario de VERANO. Esperando 1 hora..."
            sleep 3600
          else
            echo "Estamos en horario de INVIERNO. Procediendo."
          fi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🖼️ Optimize Images (dashboard)
        run: python optimize.py

      # ── Fase 1: Scraping ──
      - name: 💻 Scrape news (tier full)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scrape_news.py --tier full
      - name: 🔧 Scrape tools
        run: python scrape_tools.py

      # ── Fase 3: Blog (push directo) ──
      - name: 📂 Checkout blog repo
        uses: actions/checkout@v3
        with:
          repository: jorbencas/blog
          path: blog
          token: ${{ secrets.BLOG_TOKEN }}
          fetch-depth: 0

      # ── Fase 4: Generación (después de blog checkout para escribir directo) ──
      - name: 📝 Generate weekly recap + dashboard
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DOWNLOADER_API_TOKEN: ${{ secrets.DOWNLOADER_API_TOKEN }}
        run: python generate_weekly.py --blog-path blog
      - name: 🌐 Download free-for.dev resources
        run: |
          curl -sL https://raw.githubusercontent.com/ripienaar/free-for-dev/master/README.md -o /tmp/free-for-dev.md
          echo "✅ free-for.dev README descargado ($(wc -c < /tmp/free-for-dev.md) bytes)"
      - name: 🔗 Merge free-for.dev resources
        run: |
          python merge_freefordev.py --blog-path blog --free-dev-file /tmp/free-for-dev.md || echo "⚠️ merge_freefordev opcional — continuando sin él"
      - name: 🔄 Gestionar recursos (--clean + --reorder)
        id: blog_updated
        run: |
          python manage_resources.py --blog-path blog --tools-file files/herramientas.json --max-cards 500 --clean --reorder \
            && echo "updated=yes" >> $GITHUB_OUTPUT \
            || echo "updated=no" >> $GITHUB_OUTPUT

      # ── Fase 5: Envíos ──
      - name: 📧 Send email newsletter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
        run: python send_email.py
      - name: 🤖 Send Telegram notification
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TOKEN_API_ID: ${{ secrets.TOKEN_API_ID }}
        run: python send_telegram.py
      - name: 🖼️ Optimizar imágenes del blog
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python blog/scripts/fix_images.py
      - name: 🖼️ Generar portadas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm --prefix blog install playwright-core --no-save 2>&1
          python blog/scripts/make_cover_collage.py --ci
      - name: 🚀 Push directo al blog
        if: steps.blog_updated.outputs.updated == 'yes'
        run: |
          cd blog
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git add src/content/posts/resources*.mdx src/content/auto-news/
          git diff --quiet && git diff --staged --quiet && echo "No hay cambios" && exit 0
          git commit -m "[recursos+news] actualización semanal automática"
          git push origin main
          echo "✅ Push realizado a jorbencas/blog"
      - name: 📝 Push changes a test_githubActions
        if: always()
        run: |
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] update tech news + tools"
          git push origin master
      - name: ✨ Deploy dashboard a Surge
        run: |
          npx surge public jorbencasdownloaderdocument.surge.sh --token ${{ secrets.SURGE_TOKEN }}
