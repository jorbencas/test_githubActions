name: 🏹 Cazador de Retos IA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * 0'

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout del código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏹 Ejecutar Cacería de Retos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python hunt_challenges.py

      - name: 📂 Checkout blog repo
        uses: actions/checkout@v4
        with:
          repository: jorbencas/blog
          path: blog
          token: ${{ secrets.BLOG_TOKEN }}
          fetch-depth: 0

      - name: 🔄 Sincronizar retos nuevos al blog
        id: sync_process
        run: |
          mkdir -p blog/src/content/auto-challenges

          COUNT=0
          for file in auto-challenges/*.mdx; do
            [ -e "$file" ] || continue
            filename=$(basename "$file")
            if [ ! -f "blog/src/content/auto-challenges/$filename" ]; then
              cp "$file" "blog/src/content/auto-challenges/"
              echo "🆕 Nuevo reto: $filename"
              COUNT=$((COUNT + 1))
            else
              echo "✅ Ya existía: $filename"
            fi
          done

          echo "total_nuevos=$COUNT" >> $GITHUB_OUTPUT
          echo "has_changes=$([ $COUNT -gt 0 ] && echo yes || echo no)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        if: steps.sync_process.outputs.has_changes == 'yes'
        with:
          token: ${{ secrets.BLOG_TOKEN }}
          path: blog
          commit-message: "feat: nuevos retos de programación para revisar"
          branch: "challenges/weekly-${{ github.run_id }}"
          title: "🎯 Review Necesaria: Nuevos Retos de Programación"
          body: |
            Se han detectado nuevos retos de programación generados por IA.
            Por favor, revisa las soluciones antes de hacer Merge.
          base: main

      - name: 📝 Commit y Push de los nuevos MDX
        run: |
          if [ -d "./auto-challenges" ] && ls auto-challenges/*.mdx >/dev/null 2>&1; then
            git config user.name jorbencas
            git config user.email jorbencas@gmail.com
            git add auto-challenges/*.mdx
            git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 IA: Nuevos retos de programación generados" && git push)
          else
            echo "❌ No hay retos nuevos que añadir"
          fi
