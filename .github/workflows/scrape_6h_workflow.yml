name: 🌐 Scraping Semidiario (tier standard)
on:
  schedule:
    - cron: "0 */6 * * *" # Cada 6 horas
  workflow_dispatch:

jobs:
  scrape_6h:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 💻 Scrape news (tier standard — web sources)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scrape_news.py --tier standard
      - name: 📝 Push cambios
        if: always()
        run: |
          git config user.name jorbencas
          git config user.email jorbencas@gmail.com
          git add files/noticias_historico.json files/avatars_cache.json
          git diff --quiet --cached || git commit -m "[bot] 6h scrape (tier standard)"
          git push origin master
